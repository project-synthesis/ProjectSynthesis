worker_processes 1;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 256;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;
    sendfile on;
    keepalive_timeout 65;

    # Request size limit (prompts can be large but bounded)
    client_max_body_size 2m;

    # Logging
    access_log /var/log/nginx/access.log;

    # Gzip compression (exclude text/event-stream — gzip causes SSE buffering)
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 256;

    # Shared security headers (defined as map to avoid inheritance issues
    # with nested location blocks — nginx replaces parent add_header directives
    # when a child block uses add_header)
    # Using an include file pattern instead:

    # Upstream definitions
    upstream backend {
        server 127.0.0.1:8000;
    }

    upstream mcp {
        server 127.0.0.1:8001;
    }

    server {
        listen 8080;

        # ── Security headers (repeated in nested locations due to nginx inheritance rules) ──
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'none';" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        # Enable HSTS when TLS is active
        set $hsts "";
        if ($scheme = https) {
            set $hsts "max-age=31536000; includeSubDomains";
        }
        add_header Strict-Transport-Security $hsts always;

        # SSE event stream — long-lived persistent connection
        location = /api/events {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # API proxy — all /api/* routes
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # SSE support for streaming endpoints (optimize, refine)
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # MCP server proxy — streamable HTTP transport
        location /mcp {
            # Defense-in-depth: block external unauthenticated MCP access
            set $mcp_auth_ok 0;
            if ($http_authorization != "") {
                set $mcp_auth_ok 1;
            }
            if ($remote_addr = 127.0.0.1) {
                set $mcp_auth_ok 1;
            }
            if ($mcp_auth_ok = 0) {
                return 403;
            }

            proxy_pass http://mcp/mcp;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 300s;
            proxy_buffering off;
        }

        # Frontend static files (SvelteKit build output)
        location / {
            root /app/frontend/build;
            try_files $uri $uri/ /index.html;

            # Cache immutable hashed assets aggressively
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
                expires 7d;
                # Re-declare security headers (nginx drops parent add_header in nested blocks)
                add_header Cache-Control "public, immutable";
                add_header X-Content-Type-Options "nosniff" always;
                add_header X-Frame-Options "DENY" always;
                add_header Referrer-Policy "strict-origin-when-cross-origin" always;
                add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'none';" always;
                add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
                add_header Strict-Transport-Security $hsts always;
            }
        }

        # Custom error page when backend is unavailable
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
