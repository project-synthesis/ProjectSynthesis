version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - db-data:/app/data
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - SECRET_KEY=${SECRET_KEY:-synthesis-dev-secret-key}
      - GITHUB_TOKEN_ENCRYPTION_KEY=${GITHUB_TOKEN_ENCRYPTION_KEY:-}
      - DATABASE_URL=sqlite+aiosqlite:///./data/synthesis.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5199:5199"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - VITE_API_URL=http://backend:8000

  mcp:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m app.mcp_server
    ports:
      - "8001:8001"
    volumes:
      - db-data:/app/data
    environment:
      - MCP_PORT=8001
      - MCP_HOST=0.0.0.0
      - DATABASE_URL=sqlite+aiosqlite:///./data/synthesis.db
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db-data:
