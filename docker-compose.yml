services:
  # ── Init container — auto-generates shared secrets ──
  secrets-init:
    image: alpine:3.21
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -eu
        PASS_FILE=/data/.redis_password
        if [ -f "$$PASS_FILE" ]; then
          # Validate existing file is non-empty and has expected length
          LEN=$$(wc -c < "$$PASS_FILE" | tr -d ' ')
          if [ "$$LEN" -ge 32 ]; then
            echo "secrets-init: Redis password already exists ($$LEN chars), skipping."
            exit 0
          fi
          echo "secrets-init: Existing password file too short ($$LEN chars), regenerating."
        fi
        PASS=$$(head -c 32 /dev/urandom | od -A n -t x1 | tr -d ' \n')
        # Atomic write: temp file + mv prevents partial reads by other containers
        printf '%s' "$$PASS" > "$$PASS_FILE.tmp"
        chmod 644 "$$PASS_FILE.tmp"
        mv "$$PASS_FILE.tmp" "$$PASS_FILE"
        echo "secrets-init: Generated Redis password (64 chars)."
    volumes:
      - db-data:/data
    restart: "no"
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    deploy:
      resources:
        limits:
          memory: 32m
          cpus: "0.25"
          pids: 16
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "1"
    networks:
      - synthesis

  # ── Reverse proxy — only host-exposed service ──
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "127.0.0.1:8001:8001"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
      mcp:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/log/nginx
      - /tmp
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID, NET_BIND_SERVICE]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"
          pids: 64
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - synthesis

  # ── FastAPI backend ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        VERSION: ${APP_VERSION:-dev}
    image: synthesis-backend
    volumes:
      - db-data:/app/data
    env_file:
      - .env.docker
    depends_on:
      secrets-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2"
          pids: 256
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - synthesis

  # ── SvelteKit frontend ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VERSION: ${APP_VERSION:-dev}
    environment:
      - ORIGIN=${ORIGIN:-http://localhost}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5199/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
          pids: 128
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - synthesis

  # ── Standalone MCP server (reuses backend image) ──
  mcp:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: synthesis-backend
    command: ["python", "-m", "app.mcp_server"]
    volumes:
      - db-data:/app/data
    env_file:
      - .env.docker
    depends_on:
      secrets-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('127.0.0.1',8001),2); s.close()"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1"
          pids: 128
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - synthesis

  # ── Redis (optional caching + rate limiting) ──
  redis:
    image: redis:8-alpine
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -eu
        PASS="$${REDIS_PASSWORD:-$$(cat /secrets/.redis_password 2>/dev/null || echo '')}"
        if [ -z "$$PASS" ]; then
          echo "ERROR: No Redis password found. Set REDIS_PASSWORD or ensure secrets-init ran." >&2
          exit 1
        fi
        exec redis-server \
          --appendonly yes \
          --maxmemory 256mb \
          --maxmemory-policy allkeys-lru \
          --requirepass "$$PASS"
    environment:
      # Pass through host env var for backward compat (overrides file-based password)
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
      - db-data:/secrets:ro
    depends_on:
      secrets-init:
        condition: service_completed_successfully
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$${REDIS_PASSWORD:-$$(cat /secrets/.redis_password 2>/dev/null)} redis-cli ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
          pids: 64
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - synthesis

volumes:
  db-data:
  redis-data:

networks:
  synthesis:
    driver: bridge
