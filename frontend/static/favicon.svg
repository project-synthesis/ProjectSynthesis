<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <clipPath id="top-half">
      <rect x="0" y="0" width="32" height="15"/>
    </clipPath>
    <clipPath id="bot-half">
      <rect x="0" y="17" width="32" height="15"/>
    </clipPath>
  </defs>
  <rect width="32" height="32" fill="#06060c"/>

  <!--
    Cyberpunk 2077 S:
    1. Italic slant (skewX -8deg) — aggressive forward lean
    2. The glyph is CUT horizontally at y=16 into two halves
    3. Top half shifted 1.5px LEFT, bottom half shifted 1.5px RIGHT
       (the signature CP2077 "glitch displacement" effect)
    4. Thicker stroke (4px) with bevel joins for blade-sharp corners
    5. A thin neon cyan scanline in the gap between halves
  -->

  <!-- TOP HALF of S — shifted left by 1.5px -->
  <g clip-path="url(#top-half)" transform="translate(-1.5, 0)">
    <g transform="translate(16,16) skewX(-10) translate(-16,-16)">
      <polyline
        fill="none"
        stroke="url(#g)"
        stroke-width="4"
        stroke-linecap="square"
        stroke-linejoin="bevel"
        points="23,6 9,6 9,10 12,14 20,18 23,22 23,26 9,26"
      />
    </g>
  </g>

  <!-- BOTTOM HALF of S — shifted right by 1.5px -->
  <g clip-path="url(#bot-half)" transform="translate(1.5, 0)">
    <g transform="translate(16,16) skewX(-10) translate(-16,-16)">
      <polyline
        fill="none"
        stroke="url(#g)"
        stroke-width="4"
        stroke-linecap="square"
        stroke-linejoin="bevel"
        points="23,6 9,6 9,10 12,14 20,18 23,22 23,26 9,26"
      />
    </g>
  </g>

  <!-- Glitch gap: neon scanline in the displacement cut -->
  <rect x="0" y="15" width="32" height="2" fill="#06060c"/>
  <rect x="8" y="15.5" width="16" height="1" fill="#00e5ff" opacity="0.5"/>

  <!-- Secondary glitch: tiny offset fragment below the cut -->
  <rect x="18" y="17" width="4" height="0.8" fill="#a855f7" opacity="0.4"/>
</svg>
